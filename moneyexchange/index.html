<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/src/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="RupeeFlow - The instant, secure Web3 off-ramp to convert USDC stablecoins directly into Indian Rupees (INR) sent instantly via UPI or bank transfer." />
    <meta name="keywords" content="USDC, INR, crypto off-ramp, convert USDC to INR, India crypto to UPI, stablecoin bank transfer" />
    <meta name="color-scheme" content="dark light" />
    <title>RupeeFlow | Instant USDC to INR Web3 Off-Ramp</title>
    
    <!-- Preconnect and Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Dark/Light Theme Stabilizer -->
    <script>
      (function() {
        const savedTheme = localStorage.getItem("rupeeflow-theme") || "dark";
        document.documentElement.setAttribute("data-theme", savedTheme);
        document.querySelector('meta[name="color-scheme"]').content = savedTheme === "dark" ? "dark light" : "light dark";
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
